<!doctype html>
<html data-bs-theme="dark">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <title>Spotelly</title>
  </head>

  <body class="d-flex flex-column text-center">
    <main class="flex-grow-1 mt-3 mb-5">
      <table class="table table-bordered table-striped w-auto mx-auto">
        <thead id="h" />
        <tbody id="b" />
      </table>
    </main>

    <footer class="bg-primary fixed-bottom" id="f" />
    <script>
      const f = x => x.toTimeString().slice(0, 5);
      const u = (x, y) => (document.getElementById(x).innerHTML = y);

      async function l() {
        fetch(window.location.href.replace("spotelly", "data"))
          .then(r => r.json())
          .then(d => {
            let count = 0;
            let average = 0;

            u("h", `<tr><th colspan=3>Power Output Timetable for Switch ${d.s}<tr><th>Date<th>Hour<th>ct/kWh`);

            const times = d.t.filter(x => x[2] !== false).sort((a, b) => a[0] - b[0]);

            if (!times.length) {
              u("b", "<tr><td colspan=3 class=p-5>No data");
            } else {
              let body = "";
              let sum = 0;
              let fallback = false;
              for (let [h, p] of times) {
                count++;
                if (!fallback && p !== "-") {
                  sum += p;
                  p = p.toFixed(2);
                } else {
                  fallback = true;
                }
                const start = new Date(h);
                body += `<tr><td>${start.toLocaleDateString()}<td>${f(start)}-${f(new Date(start.getTime() + 3_600_000))}<td class=text-end>${p}`;
              }
              average = fallback ? "unknown" : (sum / count).toFixed(2);
              u("b", body);
            }

            u("f", `Hours: ${count}, Average Price: ${average} ct/kWh<br>Next Update: ${new Date(d.n).toLocaleString()}`);
          });
      }

      window.onload = l;
    </script>
  </body>
</html>
