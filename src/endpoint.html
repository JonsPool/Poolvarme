<!doctype html>
<html data-bs-theme="dark" class="mt-5">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <title>Spotelly</title>
  </head>

  <body>
    <table class="table table-bordered table-striped w-auto mx-auto text-center">
      <thead id="h"></thead>
      <tbody id="b"></tbody>
    </table>
    <script>
      async function l() {
        fetch(window.location.href.replace("spotelly", "data"))
          .then(r => r.json())
          .then(d => {
            const formatHour = x => x.toTimeString().slice(0, 5);
            document.getElementById("h").innerHTML =
              `<tr><th colspan=3>Power Output Timetable for Switch ${d.switchID}<tr><th>Date<th>Hour<th>cent/kWh`;

            const body = document.getElementById("b");
            for (const [h, p] of Object.entries(d.times).sort((a, b) => a[0] - b[0])) {
              if (p !== null) {
                const start = new Date(Number(h));
                body.insertRow().innerHTML = `<td>${start.toLocaleDateString()}<td>${formatHour(start)}-${formatHour(new Date(start.getTime() + 3_600_000))}<td class=text-end>${p.toFixed(2)}`;
              }
            }

            if (!body.firstChild) body.innerHTML = `<tr><td colspan=3 class=p-5>No data`;

            body.insertRow().innerHTML = `<td colspan=3><p class="m-0 p-0 fst-italic">Next update: ${new Date(d.nextUpdate).toLocaleString()}</p>`;
          });
      }

      window.onload = l;
    </script>
  </body>
</html>
