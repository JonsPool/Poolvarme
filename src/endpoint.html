<!doctype html>
<html data-bs-theme="dark">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <title>Spotelly</title>
  </head>

  <body class="d-flex flex-column text-center">
    <main class="flex-grow-1 mt-3 mb-5">
      <table class="table table-bordered table-striped w-auto mx-auto">
        <thead id="h" />
        <tbody id="b" />
      </table>
    </main>

    <footer class="bg-primary fixed-bottom" id="f" />
    <script>
      const formatHour = x => x.toTimeString().slice(0, 5);

      async function l() {
        fetch(window.location.href.replace("spotelly", "data"))
          .then(r => r.json())
          .then(d => {
            let body = "";
            let count = 0;
            let sum = 0;
            let average = 0;

            document.getElementById("h").innerHTML = `<tr><th colspan=3>Power Output Timetable for Switch ${d.switchID}<tr><th>Date<th>Hour<th>cent/kWh`;

            for (const [h, p] of Object.entries(d.times).sort((a, b) => a[0] - b[0])) {
              if (p !== null) {
                count++;
                sum += p;
                const start = new Date(Number(h));
                body += `<tr><td>${start.toLocaleDateString()}<td>${formatHour(start)}-${formatHour(new Date(start.getTime() + 3_600_000))}<td class=text-end>${p.toFixed(2)}`;
              }
            }

            body ? (average = sum / count) : (body = `<tr><td colspan=3 class=p-5>No data`);

            document.getElementById("f").innerHTML = `Hours: ${count}, Average Price: ${average.toFixed(2)} cent/kWh<br>Next Update: ${new Date(d.nextUpdate).toLocaleString()}`;
            document.getElementById("b").innerHTML = body;
          });
      }

      window.onload = l;
    </script>
  </body>
</html>
