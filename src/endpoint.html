<!doctype html>
<html data-bs-theme="dark">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <title>Spotelly</title>
  </head>

  <body class="d-flex flex-column text-center">
    <main class="flex-grow-1 mt-3 mb-5">
      <table class="table table-bordered table-striped w-auto mx-auto">
        <thead id="h" />
        <tbody id="b" />
      </table>
    </main>

    <footer class="bg-primary fixed-bottom" id="f" />
    <script>
      const u = window.location.href.replace("spotelly", "data");
      const c = (x, y) => (document.getElementById(x).innerHTML = y);
      const i = ts => new Date(ts).toLocaleString("sv", { dateStyle: "short", timeStyle: "medium" });

      const m = d => {
        c("h", `<tr><th colspan=4>Power Output Timetable for Switch ${d.s}<tr><th>Date<th>Hour<th>ct/kWh<th>On`);
        let count = 0;
        let sum = 0;
        let body = "";

        if (d.a) {
          let h = d.a;
          d.p = d.p.map(x => x ?? NaN);
          const max = Math.max(...d.p);
          const min = Math.min(...d.p);

          d.p.forEach((p, idx) => {
            const o = d.o[idx];

            if (o) {
              sum += p;
              count++;
            }

            const color = isNaN(max) ? "0, 0%, 100%" : `${(1 - (p - min) / (max - min)) * 120}, 100%, 50%`;
            const s = `style="color: hsl(${color});"`;
            body += `<tr><td ${s}>${i(h).slice(0, 10)}<td ${s}>${i(h).slice(11, 16)}<td ${s} class=text-end>${p.toFixed(2)}<td><div class=form-switch><input class=form-check-input type=checkbox ${o ? "checked" : ""} onClick="t(${h}, this.checked)"></div>`;
            h += 3600000;
          });
        }

        c("b", body || "<tr><td colspan=4 class=p-5>No data");

        const w = new Date();
        const n = d.n ? d.n : new Date(w.getFullYear(), w.getMonth(), w.getDate() + (w.getHours() >= 15), 15).getTime() + d.r;

        c("f", `Selected: ${count} Hours, Average: ${(count ? sum / count : 0).toFixed(2)} ct/kWh<br>Next Update: ${i(n)}`);
      };

      const t = (h, o) => {
        fetch(u, h ? { method: "POST", body: JSON.stringify({ h, o }) } : { method: "GET" })
          .then(r => r.json())
          .then(d => m(d))
          .catch(e => c("b", `<tr><td colspan=4 class=p-5>${e}`));
      };

      window.onload = t;
    </script>
  </body>
</html>
